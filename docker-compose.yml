services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lexiflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lexiflow}
      POSTGRES_USER: ${POSTGRES_USER:-lexiflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lexiflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lexiflow} -d ${POSTGRES_DB:-lexiflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: lexiflow-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-lexiflow}"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-lexiflow}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: lexiflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-lexiflow}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-lexiflow}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: node:24-alpine
    container_name: lexiflow-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    profiles:
      - app

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
