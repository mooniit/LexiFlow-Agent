spring:
  application:
    name: lexiflow-agent
  profiles:
    active: dev
  threads:
    virtual:
      enabled: true

server:
  port: 8080
  servlet:
    context-path: /api

management:
  health:
    rabbit:
      enabled: true
    redis:
      enabled: true
    db:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: LexiFlow Agent
    description: Enterprise contract and compliance review Agent
    version: 0.0.1-SNAPSHOT

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

lexiflow:
  security:
    jwt:
      issuer: lexiflow-agent
      secret: "change-me-change-me-change-me-change-me-change-me"
      expires-minutes: 480
  llm:
    provider: mock
  storage:
    contracts-dir: ../storage/contracts
    knowledge-dir: ../storage/knowledge
  rabbitmq:
    queues:
      - contract.review.queue
      - document.ingest.queue
      - tool.retry.queue
      - approval.event.queue
      - notification.queue
    exchange: lexiflow.agent.exchange
