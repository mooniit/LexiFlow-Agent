spring:
  application:
    name: lexiflow-agent
  profiles:
    active: dev
  threads:
    virtual:
      enabled: true

server:
  port: 8080
  servlet:
    context-path: /api

management:
  health:
    rabbit:
      enabled: true
    redis:
      enabled: true
    db:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: LexiFlow Agent
    description: Enterprise contract and compliance review Agent
    version: 0.0.1-SNAPSHOT

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

lexiflow:
  security:
    jwt:
      issuer: lexiflow-agent
      secret: "change-me-change-me-change-me-change-me-change-me"
      expires-minutes: 480
  llm:
    provider: ${LEXIFLOW_LLM_PROVIDER:mock}
    deepseek:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:}
      chat-model: ${DEEPSEEK_CHAT_MODEL:deepseek-v4-flash}
    dashscope:
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key: ${DASHSCOPE_API_KEY:}
      embedding-model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
      embedding-dimensions: ${DASHSCOPE_EMBEDDING_DIMENSIONS:1536}
  rag:
    similarity-threshold: ${LEXIFLOW_RAG_SIMILARITY_THRESHOLD:0.40}
  storage:
    contracts-dir: ../storage/contracts
    knowledge-dir: ../storage/knowledge
  rabbitmq:
    queues:
      - contract.review.queue
      - document.ingest.queue
      - tool.retry.queue
      - approval.event.queue
      - notification.queue
    exchange: lexiflow.agent.exchange
